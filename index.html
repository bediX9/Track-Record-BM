<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyclora</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); cursor: pointer; }
        .btn { background: #1a1a1a; color: white; border: none; padding: 12px 20px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; }
        .btn-secondary { background: #dc2626; }
        .input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 12px; margin-bottom: 10px; font-size: 16px; }
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 1000; }
        .modal-content { background: white; border-radius: 24px; padding: 20px; max-width: 500px; width: 100%; max-height: 80vh; overflow-y: auto; }
        .tag { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-right: 8px; margin-top: 8px; }
        h1 { font-size: 24px; }
        .sub { color: #666; font-size: 12px; margin-bottom: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #eee; }
        .tab { padding: 10px 15px; cursor: pointer; border-bottom: 2px solid transparent; }
        .tab.active { border-bottom-color: #1a1a1a; font-weight: bold; }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        const STORAGE_KEY = "cyclora_profiles";
        let profiles = [];
        let showModal = false;
        let editingProfile = null;
        let currentTab = "basic";

        function loadProfiles() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                profiles = JSON.parse(saved);
            } else {
                profiles = [{
                    id: Date.now(),
                    firstName: "Sophie",
                    lastName: "Martin",
                    lastPeriod: new Date().toISOString().slice(0,10),
                    cycleLength: 28,
                    periodDuration: 5,
                    priority: 1,
                    notes: ""
                }];
                saveProfiles();
            }
            render();
        }

        function saveProfiles() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(profiles));
        }

        function deleteProfile(id) {
            if (confirm("Supprimer ce profil ?")) {
                profiles = profiles.filter(p => p.id !== id);
                saveProfiles();
                closeModal();
                render();
            }
        }

        function saveProfile(profile) {
            if (!profile.firstName.trim()) {
                alert("Le prénom est requis");
                return false;
            }
            if (!profile.lastPeriod) {
                alert("La date des dernières règles est requise");
                return false;
            }
            
            if (profile.id) {
                profiles = profiles.map(p => p.id === profile.id ? profile : p);
            } else {
                profile.id = Date.now();
                profiles.push(profile);
            }
            saveProfiles();
            return true;
        }

        function getCycleInfo(profile) {
            const today = new Date();
            today.setHours(0,0,0,0);
            const lastPeriod = new Date(profile.lastPeriod);
            lastPeriod.setHours(0,0,0,0);
            const daysSince = Math.floor((today - lastPeriod) / (1000*60*60*24));
            const cycleLength = profile.cycleLength || 28;
            const dayOfCycle = (daysSince % cycleLength) + 1;
            const daysToNextPeriod = cycleLength - dayOfCycle + 1;
            
            let phase = "";
            let phaseColor = "";
            if (dayOfCycle <= profile.periodDuration) {
                phase = "🩸 Menstruation";
                phaseColor = "#fecaca";
            } else if (dayOfCycle <= 12) {
                phase = "🌱 Phase folliculaire";
                phaseColor = "#dbeafe";
            } else if (dayOfCycle <= 16) {
                phase = "🌸 Fenêtre fertile";
                phaseColor = "#dcfce7";
            } else if (dayOfCycle === 17) {
                phase = "🥚 Ovulation";
                phaseColor = "#fed7aa";
            } else {
                phase = "✨ Phase lutéale";
                phaseColor = "#f3e8ff";
            }
            
            return { dayOfCycle, cycleLength, daysToNextPeriod, phase, phaseColor };
        }

        function openModal(profile = null) {
            if (profile) {
                editingProfile = JSON.parse(JSON.stringify(profile));
            } else {
                editingProfile = {
                    id: null,
                    firstName: "",
                    lastName: "",
                    lastPeriod: new Date().toISOString().slice(0,10),
                    cycleLength: 28,
                    periodDuration: 5,
                    priority: 1,
                    notes: ""
                };
            }
            currentTab = "basic";
            showModal = true;
            renderModal();
        }

        function closeModal() {
            showModal = false;
            editingProfile = null;
            render();
        }

        function updateFormField(field, value) {
            if (editingProfile) {
                editingProfile[field] = value;
                renderModal();
            }
        }

        function renderModal() {
            const modalDiv = document.getElementById("modal-container");
            if (!modalDiv) return;
            
            if (!showModal || !editingProfile) {
                modalDiv.innerHTML = "";
                return;
            }
            
            const p = editingProfile;
            const info = getCycleInfo(p);
            
            modalDiv.innerHTML = `
                <div class="modal" onclick="closeModal()">
                    <div class="modal-content" onclick="event.stopPropagation()">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                            <h3>${p.id ? "✏️ Modifier" : "➕ Nouveau"} profil</h3>
                            <button onclick="closeModal()" style="background: none; border: none; font-size: 24px; cursor: pointer;">×</button>
                        </div>
                        
                        <div class="tabs">
                            <div class="tab ${currentTab === 'basic' ? 'active' : ''}" onclick="currentTab='basic'; renderModal()">👤 Identité</div>
                            <div class="tab ${currentTab === 'cycle' ? 'active' : ''}" onclick="currentTab='cycle'; renderModal()">📅 Cycle</div>
                        </div>
                        
                        ${currentTab === 'basic' ? `
                            <input class="input" placeholder="Prénom *" value="${escapeHtml(p.firstName)}" onchange="updateFormField('firstName', this.value)">
                            <input class="input" placeholder="Nom" value="${escapeHtml(p.lastName)}" onchange="updateFormField('lastName', this.value)">
                            <textarea class="input" rows="3" placeholder="Notes (symptômes, remarques...)" onchange="updateFormField('notes', this.value)">${escapeHtml(p.notes)}</textarea>
                            <div style="margin-top: 10px;">
                                <label style="font-size: 12px; color: #666;">Niveau de priorité</label>
                                <div style="display: flex; gap: 10px; margin-top: 5px;">
                                    <button onclick="updateFormField('priority', 1)" style="padding: 8px 12px; border-radius: 10px; border: 1px solid #ddd; background: ${p.priority === 1 ? '#fee2e2' : 'white'}">🔴 Priorité 1</button>
                                    <button onclick="updateFormField('priority', 2)" style="padding: 8px 12px; border-radius: 10px; border: 1px solid #ddd; background: ${p.priority === 2 ? '#ffedd5' : 'white'}">🟠 Priorité 2</button>
                                    <button onclick="updateFormField('priority', 3)" style="padding: 8px 12px; border-radius: 10px; border: 1px solid #ddd; background: ${p.priority === 3 ? '#fef9c3' : 'white'}">🟡 Priorité 3</button>
                                </div>
                            </div>
                        ` : `
                            <label style="font-size: 12px; color: #666;">📅 Date des dernières règles *</label>
                            <input type="date" class="input" value="${p.lastPeriod}" onchange="updateFormField('lastPeriod', this.value)">
                            
                            <label style="font-size: 12px; color: #666;">⏱️ Durée du cycle: <strong>${p.cycleLength} jours</strong></label>
                            <input type="range" min="18" max="60" value="${p.cycleLength}" onchange="updateFormField('cycleLength', parseInt(this.value))" style="width: 100%; margin-bottom: 15px;">
                            
                            <label style="font-size: 12px; color: #666;">🩸 Durée des règles: <strong>${p.periodDuration} jours</strong></label>
                            <input type="range" min="1" max="10" value="${p.periodDuration}" onchange="updateFormField('periodDuration', parseInt(this.value))" style="width: 100%; margin-bottom: 15px;">
                            
                            <div style="margin-top: 15px; padding: 12px; background: ${info.phaseColor}; border-radius: 12px;">
                                <div style="font-size: 14px;"><strong>📊 Aperçu du cycle</strong></div>
                                <div style="font-size: 12px; margin-top: 5px;">${info.phase}</div>
                                <div style="font-size: 24px; font-weight: bold; margin-top: 5px;">Jour ${info.dayOfCycle} / ${info.cycleLength}</div>
                                <div style="font-size: 12px;">Prochaines règles dans ${info.daysToNextPeriod} jour${info.daysToNextPeriod > 1 ? 's' : ''}</div>
                            </div>
                        `}
                        
                        <div style="display: flex; gap: 10px; margin-top: 20px;">
                            <button class="btn" onclick="if(saveProfile(editingProfile)) { closeModal(); render(); }">${p.id ? "💾 Enregistrer" : "✅ Créer"}</button>
                            ${p.id ? `<button class="btn btn-secondary" onclick="deleteProfile(${p.id})">🗑️ Supprimer</button>` : ""}
                        </div>
                    </div>
                </div>
            `;
        }

        function escapeHtml(str) {
            if (!str) return "";
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function render() {
            const app = document.getElementById("app");
            if (!app) return;
            
            const activeProfiles = profiles.filter(p => p.priority !== 4);
            
            app.innerHTML = `
                <div class="container">
                    <div class="header">
                        <div>
                            <h1>🌸 Cyclora</h1>
                            <div class="sub">Suivi du cycle menstruel • Données sauvegardées localement</div>
                        </div>
                        <button class="btn" style="width: auto; margin: 0; padding: 10px 20px;" onclick="openModal()">+ Nouveau</button>
                    </div>
                    
                    ${profiles.length === 0 ? `
                        <div style="text-align: center; padding: 60px 20px;">
                            <div style="font-size: 48px; margin-bottom: 16px;">🌸</div>
                            <div style="font-weight: bold; margin-bottom: 8px;">Aucun profil</div>
                            <div style="color: #666; margin-bottom: 20px;">Créez votre premier profil pour commencer</div>
                            <button class="btn" onclick="openModal()">Créer un profil</button>
                        </div>
                    ` : `
                        ${activeProfiles.map(p => {
                            const info = getCycleInfo(p);
                            const priorityIcon = p.priority === 1 ? "🔴" : p.priority === 2 ? "🟠" : "🟡";
                            return `
                                <div class="card" onclick='openModal(${JSON.stringify(p)})'>
                                    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                                        <div style="flex: 1;">
                                            <div style="display: flex; align-items: center; gap: 8px;">
                                                <span style="font-size: 20px;">${priorityIcon}</span>
                                                <strong style="font-size: 16px;">${escapeHtml(p.firstName)} ${escapeHtml(p.lastName)}</strong>
                                            </div>
                                            <div style="margin-top: 8px;">
                                                <span class="tag" style="background: ${info.phaseColor}">${info.phase}</span>
                                                <span class="tag" style="background: #e5e7eb;">📅 J${info.dayOfCycle}/${info.cycleLength}</span>
                                            </div>
                                            <div style="margin-top: 8px;">
                                                <span class="tag" style="background: #e0e7ff;">⏰ Règles dans ${info.daysToNextPeriod}j</span>
                                            </div>
                                            ${p.notes ? `<div style="font-size: 11px; color: #999; margin-top: 8px;">📝 ${escapeHtml(p.notes.substring(0, 60))}${p.notes.length > 60 ? '...' : ''}</div>` : ''}
                                        </div>
                                        <div style="text-align: right;">
                                            <div style="font-size: 28px; font-weight: bold;">J${info.dayOfCycle}</div>
                                        </div>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    `}
                    
                    <div style="margin-top: 20px; text-align: center; font-size: 11px; color: #999;">
                        💾 Vos données sont sauvegardées automatiquement dans ce navigateur
                    </div>
                    
                    <div id="modal-container"></div>
                </div>
            `;
            
            if (showModal) renderModal();
        }

        // Démarrage
        loadProfiles();
    </script>
</body>
</html>
